  const goToSlide = useCallback((index) => {
    if (index >= 0 && index < SLIDES.length) {
      setCurrent(index);
    }
  }, [SLIDES.length]);

  const nextSlide = useCallback(() => {
    goToSlide(current + 1);
    setDirection(1);
  }, [current, goToSlide]);

  const prevSlide = useCallback(() => {
    goToSlide(current - 1);
    setDirection(-1);
  }, [current, goToSlide]);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSlide();
      }
    };

    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [nextSlide, prevSlide]);

  useEffect(() => {
    let touchStartX = 0;
    const handleTouchStart = (e) => {
      touchStartX = e.touches[0].clientX;
    };

    const handleTouchEnd = (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const swipeDistance = touchStartX - touchEndX;
      if (swipeDistance > 50) {
        nextSlide();
      } else if (swipeDistance < -50) {
        prevSlide();
      }
    };

    window.addEventListener('touchstart', handleTouchStart);
    window.addEventListener('touchend', handleTouchEnd);
    return () => {
      window.removeEventListener('touchstart', handleTouchStart);
      window.removeEventListener('touchend', handleTouchEnd);
    };
  }, [nextSlide, prevSlide]);

  return (
    <div className="relative w-full h-screen overflow-hidden font-sans"
         style={{ background: 'linear-gradient(180deg, #0a0a0f 0%, #0f0f1a 100%)' }}>
      <GridOverlay />
      <LanguageToggle lang={lang} onToggle={setLang} />

      <div className="relative w-full h-full">
        {SLIDES.map((slide, idx) => (
          <div
            key={slide.id}
            className={`absolute inset-0 transition-all duration-700 ${
              idx === current ? 'z-10' : idx < current ? '-z-10' : 'z-0'
            }`}
          >
            {slide.render(idx === current)}
          </div>
        ))}
      </div>

      <SlideNav current={current} total={SLIDES.length} onGoTo={goToSlide} />

      <button
        onClick={nextSlide}
        disabled={current >= SLIDES.length - 1}
        className="absolute bottom-12 right-4 md:right-20 z-20 px-6 py-2 rounded-lg bg-indigo-500/20 border border-indigo-400/50 text-indigo-300 hover:bg-indigo-500/30 disabled:opacity-30 transition text-sm font-bold"
      >
        Next →
      </button>

      <button
        onClick={prevSlide}
        disabled={current === 0}
        className="absolute bottom-12 left-6 z-20 px-6 py-2 rounded-lg bg-slate-700/20 border border-slate-600/50 text-slate-300 hover:bg-slate-700/30 disabled:opacity-30 transition text-sm font-bold"
      >
        ← Back
      </button>

      <div
        className="absolute inset-0 cursor-pointer z-0"
        onClick={nextSlide}
      />
    </div>
  );
}


        // Render the component
        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<SkillCapPitch />);
    </script>
</body>
</html>
